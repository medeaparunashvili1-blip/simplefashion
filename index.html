<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Store - Modern Clothing & Accessories</title>
    <link rel="stylesheet" href="/style.css" />
    <meta property="og:image" content="https://bolt.new/static/og_default.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://bolt.new/static/og_default.png">
</head>
  <body>
    <nav class="navbar">
      <div class="container">
        <div class="nav-brand">Fashion Store</div>
        <div class="nav-links">
          <a href="/" class="nav-link active">Shop</a>
          <a href="/login.html" class="nav-link">Login</a>
          <button class="cart-btn" id="cartBtn">
            <span class="cart-icon">🛒</span>
            <span class="cart-count" id="cartCount">0</span>
          </button>
        </div>
      </div>
    </nav>

    <main class="main-content">
      <div class="container">
        <div class="hero-section">
          <h1>Discover Your Style</h1>
          <p>Explore our curated collection of fashion essentials</p>
        </div>

        <div class="filter-section">
          <button class="filter-btn active" data-category="All">All Products</button>
          <button class="filter-btn" data-category="Men">Men</button>
          <button class="filter-btn" data-category="Women">Women</button>
          <button class="filter-btn" data-category="Shoes">Shoes</button>
          <button class="filter-btn" data-category="Accessories">Accessories</button>
        </div>

        <div class="products-grid" id="productsGrid">
          <div class="loading">Loading products...</div>
        </div>
      </div>
    </main>

    <div class="cart-modal" id="cartModal">
      <div class="cart-content">
        <div class="cart-header">
          <h2>Shopping Cart</h2>
          <button class="close-btn" id="closeCart">&times;</button>
        </div>
        <div class="cart-items" id="cartItems"></div>
        <div class="cart-footer">
          <div class="cart-total">
            <span>Total:</span>
            <span id="cartTotal">$0.00</span>
          </div>
          <button class="checkout-btn" id="checkoutBtn">Proceed to Checkout</button>
        </div>
      </div>
    </div>

    <script type="module" src="/main.js"></script>
  </body>
</html>
